font_family      AdwaitaMono Nerd Font Mono
bold_font        AdwaitaMono Nerd Font Mono Bold
italic_font      AdwaitaMono Nerd Font Mono Italic
bold_italic_font AdwaitaMono Nerd Font Mono Bold Italic

font_size 10.0
adjust_line_height 110%
wayland_titlebar_color background
hide_window_decorations yes

# =====================================================
# Tabs
# =====================================================

tab_bar_edge             top
tab_bar_style            separator
tab_separator            " ┃ "
tab_bar_align            left
tab_bar_min_tabs         1

active_tab_foreground    #c0c5ce
active_tab_background    #65737e
inactive_tab_foreground  #65737e
inactive_tab_background  #343d46
tab_bar_background       #1b2b34

# =====================================================
# Keybindings
# =====================================================

map ctrl+shift+r load_config_file

# =====================================================
# Oceanic Next
# =====================================================

background            #1b2b34
foreground            #c0c5ce
cursor                #c0c5ce
selection_background  #4f5b66
selection_foreground  #c0c5ce

