"$schema" = 'https://starship.rs/config-schema.json'

[directory]
truncation_length = 8
truncate_to_repo = false
home_symbol = "~"

[git_branch]
symbol = " "
format = "[$symbol$branch]($style) "
style = "bold purple"

[git_status]
format = '([$staged](bold green)[$modified](bold yellow)[$untracked](bold blue)[$deleted](bold red)[$ahead_behind](bold yellow) )'
ahead    = "⇡${count} "
behind   = "⇣${count} "
diverged = "⇡${ahead_count} ⇣${behind_count} "
staged   = "+${count} "
modified = "!${count} "
untracked = "?${count} "
deleted  = "✘${count} "
