"$schema" = 'https://starship.rs/config-schema.json'

format = """$custom$directory$git_branch$git_status$nodejs$dotnet$python$rust$golang$java$aws$docker_context$package$line_break$character"""

[directory]
truncation_length = 8
truncate_to_repo = false
home_symbol = "~"

[git_branch]
symbol = ""
format = "[$symbol$branch]($style) "
style = "bold purple"

[custom.claude]
command = 'echo "WORK"'
when = '[ "$CLAUDE_CONFIG_DIR" = "$HOME/.claude-work" ]'
format = '[\[✳ $output\]]($style) '
style = "bold #CC785C"

[nodejs]
format = "via [$version]($style) "

[git_status]
format = '([$staged](bold green)[$modified](bold yellow)[$untracked](bold blue)[$deleted](bold red)[$ahead_behind](bold yellow))'
ahead    = "⇡${count} "
behind   = "⇣${count} "
diverged = "⇡${ahead_count} ⇣${behind_count} "
staged   = "+${count} "
modified = "!${count} "
untracked = "?${count} "
deleted  = "✘${count} "
